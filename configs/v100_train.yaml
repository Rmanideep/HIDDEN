project_name: "Hybrid-Domain-Semi-Fragile-Watermarking"
experiment_id: "Semi_Fragile_L_RE_Loss"

path_config:
  raw_path: "data/raw/celeba"
  processed_path: "data/processed"
  checkpoint_dir: "experiments/checkpoints"
  log_dir: "experiments/logs"
  identity_file: "data/raw/celeba/identity_CelebA.txt"
  landmarks_file: "data/raw/celeba/list_landmarks_celeba.txt"

data_config:
  target_train: 80000
  target_val: 10000
  target_test: 10000
  image_size: 256
  batch_size: 32              # Optimized for V100 (Increased for convergence)
  num_workers: 4              # CPU data loading
  ablation_region: "full"
  limit_samples: 10000          # Medium-scale smoke test to verify aug_prob: 0.5 fix

augmentation_config:
  enable_strong_aug: true
  rotation_range: 0            # ← DISABLED (breaks spatial-frequency alignment)
  color_jitter: 0.2
  affine_scale: null           # ← DISABLED (breaks spatial-frequency alignment)
  horizontal_flip: false
  blur_prob: 0.1
  cutout_prob: 0.1

model_config:
  watermark_length: 64         # 64-bit payload
  n_bits: 64                   # 64 bits
  discriminator_ndf: 64
  adversary_base_filters: 32
  adversary_epsilon: 0.01      # Small epsilon for subtle perturbations
  preprocessing_quality: 95
  encoder_scale: 1.0           # Full strength - L_RE loss handles fragility

training_config:
  device: "cuda:7"
  epochs: 30                   # ~70,000 iterations ÷ 1,000 samples/epoch = 70 epochs
  lr: 0.0002                  # Slightly increased for faster convergence with balanced losses
  disc_lr_mult: 1.0           # WGAN-GP uses same LR as encoder
  betas: [0.5, 0.999]
  log_freq: 10
  save_freq: 5
  accumulation_steps: 1        # No accumulation (batch fits on GPU)
  eval_freq: 1
  max_eval_steps: 50          # More eval steps for better statistics
  early_stop_patience: 15      # Allow longer convergence (no curriculum gates)

loss_config:
  # === BALANCED LOSSES FOR STABILITY ===
  lambda_l1: 15.0              # Priority 1: Restore PSNR (>35dB) during refinement
  lambda_lpips: 1.0            # Priority 1: Keep visual quality high
  lambda_ssim: 1.0             # Priority 1: Keep structural integrity
  lambda_id: 0.1               # Already stable
  lambda_bit_benign: 10.0      # Priority 2: Maintain bit recovery (reduced now that mapping is learned)
  lambda_bit_fragile: 5.0      # Priority 3: Maintain Semi-fragility
  lambda_disc: 0.1             # Critic loss
  lambda_adv: 0.1              # Adversary loss
  lambda_gp: 10.0              # WGAN-GP gradient penalty