# SOTA FINAL RUN: Optimized for GPU 6 (25GB Free)
project_name: "Deepfake-Watermarking-Universal"
experiment_id: "SOTA_Victory_Run"

path_config:
  raw_path: "data/raw/celeba"
  processed_path: "data/processed"
  checkpoint_dir: "checkpoints"
  log_dir: "logs"
  identity_file: "data/raw/celeba/identity_CelebA.txt"
  landmarks_file: "data/raw/celeba/list_landmarks_celeba.txt"

data_config:
  target_train: 80000
  target_val: 10000
  target_test: 10000
  image_size: 256
  batch_size: 4              
  num_workers: 0             
  ablation_region: "full"
  limit_samples: null

model_config:
  watermark_length: 64       
  n_bits: 80                 
  discriminator_ndf: 64      
  adversary_base_filters: 32 
  adversary_epsilon: 0.05    
  preprocessing_quality: 95  
  encoder_scale: 0.3         

training_config:
  device: "cuda:0"           
  epochs: 25                 
  lr: 0.0001                 
  disc_lr_mult: 0.5
  betas: [0.0, 0.9]          
  log_freq: 10
  save_freq: 5
  accumulation_steps: 8      
  eval_freq: 1               
  max_eval_steps: 20         
  early_stop_patience: 7     

loss_config:
  lambda_l1: 15.0            
  lambda_lpips: 10.0         
  lambda_ssim: 5.0           
  lambda_id: 2.0             
  lambda_bit_benign: 120.0   
  lambda_bit_fragile: 20.0   
  lambda_disc: 1.0           
  lambda_adv: 0.5            
  lambda_gp: 10.0